<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Mergington High School</h1>
      <h2>Extracurricular Activities</h2>
    </header>

    <main>
      <section id="activities-container">
        <h3>Available Activities</h3>
        <div id="activities-list">
          <!-- Activities will be loaded here -->
          <p>Loading activities...</p>
        </div>
      </section>

      <section id="signup-container">
        <h3>Sign Up for an Activity</h3>
        <form id="signup-form">
          <div class="form-group">
            <label for="email">Student Email:</label>
            <input type="email" id="email" required placeholder="your-email@mergington.edu" />
          </div>
          <div class="form-group">
            <label for="activity">Select Activity:</label>
            <select id="activity" required>
              <option value="">-- Select an activity --</option>
              <!-- Activity options will be loaded here -->
            </select>
          </div>
          <button type="submit">Sign Up</button>
        </form>
        <div id="message" class="hidden"></div>
      </section>

      <section id="members-container">
        <h3>Members</h3>

        <div id="members-list">
          <p>Loading members...</p>
        </div>

        <h4 id="member-form-title">Add Member</h4>
        <form id="member-form">
          <div class="form-group">
            <label for="member-email">Email:</label>
            <input type="email" id="member-email" required placeholder="student@mergington.edu" />
          </div>

          <div class="form-group">
            <label for="member-name">Name:</label>
            <input type="text" id="member-name" required placeholder="Student Name" />
          </div>

          <div class="form-group">
            <label for="member-grade">Grade:</label>
            <input type="text" id="member-grade" required placeholder="10" />
          </div>

          <button type="submit" id="member-submit-btn">Create Member</button>
          <button type="button" id="member-cancel-btn" class="secondary hidden">Cancel Edit</button>
        </form>

        <div id="member-message" class="hidden"></div>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Mergington High School</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
